<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mujeeb Ur Rehman — Home</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#F7F6F2;--white:#FFFFFF;--ink:#18181B;--muted:#71717A;--accent:#2563EB;--accent-light:#EFF6FF;--border:#E4E4E7;}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--ink);overflow-x:hidden;}

/* NAV */
nav{
  display:flex;justify-content:space-between;align-items:center;
  padding:20px 48px;background:var(--white);border-bottom:1px solid var(--border);
  position:fixed;top:0;left:0;right:0;z-index:100;
  animation:navDrop 0.7s cubic-bezier(0.22,1,0.36,1) both;
}
.logo{font-weight:700;font-size:18px;color:var(--ink);text-decoration:none;letter-spacing:-0.5px;}
.logo span{color:var(--accent);}
.nav-links{display:flex;gap:8px;list-style:none;}
.nav-links a{text-decoration:none;color:var(--muted);font-size:14px;font-weight:500;padding:8px 16px;border-radius:8px;transition:all 0.25s;display:flex;align-items:center;gap:6px;}
.nav-links a i{font-size:14px;}
.nav-links a:hover,.nav-links a.active{color:var(--accent);background:var(--accent-light);}

.page{max-width:680px;margin:0 auto;padding:88px 24px 80px;}

/* AVATAR */
.avatar-wrap{display:flex;justify-content:center;margin-bottom:28px;}
.avatar{width:110px;height:110px;border-radius:50%;display:flex;align-items:center;justify-content:center;border:4px solid var(--white);box-shadow:0 0 0 3px var(--accent),0 20px 50px rgba(37,99,235,0.2);position:relative;}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.avatar-ring{position:absolute;inset:-12px;border-radius:50%;border:2px dashed rgba(37,99,235,0.25);animation:spin 10s linear infinite;}
.avatar-dot{position:absolute;bottom:6px;right:6px;width:18px;height:18px;background:#22C55E;border-radius:50%;border:3px solid var(--white);animation:pulseDot 2s infinite;}

.center{text-align:center;}
.badge{display:inline-flex;align-items:center;gap:7px;background:var(--accent-light);color:var(--accent);font-size:12px;font-weight:600;letter-spacing:0.05em;padding:6px 16px;border-radius:100px;margin-bottom:24px;}
h1{font-size:clamp(32px,5vw,54px);font-weight:700;letter-spacing:-2px;line-height:1.1;margin-bottom:18px;}
h1 .blue{color:var(--accent);}
.subtitle{font-size:16px;color:var(--muted);font-weight:300;line-height:1.8;max-width:460px;margin:0 auto 36px;}
.hero-btns{display:flex;gap:12px;justify-content:center;}
.btn{padding:13px 28px;border-radius:10px;font-size:14px;font-weight:600;text-decoration:none;transition:all 0.25s;display:inline-flex;align-items:center;gap:8px;}
.btn-blue{background:var(--accent);color:white;box-shadow:0 4px 14px rgba(37,99,235,0.3);}
.btn-blue:hover{transform:translateY(-3px);box-shadow:0 8px 22px rgba(37,99,235,0.4);}
.btn-outline{background:var(--white);color:var(--ink);border:1.5px solid var(--border);}
.btn-outline:hover{transform:translateY(-3px);border-color:var(--accent);color:var(--accent);}

/* SCROLL ANIMATION BASE */
.sa{opacity:0;transform:translateY(28px);transition:opacity 0.65s cubic-bezier(0.22,1,0.36,1),transform 0.65s cubic-bezier(0.22,1,0.36,1);}
.sa.visible{opacity:1;transform:translateY(0);}

@keyframes navDrop{from{opacity:0;transform:translateY(-100%);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{from{transform:rotate(0);}to{transform:rotate(360deg);}}
@keyframes pulseDot{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0.5);}50%{box-shadow:0 0 0 6px rgba(34,197,94,0);}}

@media(max-width:600px){
  nav{position:fixed;bottom:0;top:auto;left:0;right:0;width:100%;padding:10px 0 14px;border-top:1px solid var(--border);border-bottom:none;background:var(--white);box-shadow:0 -4px 20px rgba(0,0,0,0.05);justify-content:center;animation:none;}
  .logo{display:none;}
  .nav-links{width:100%;justify-content:space-around;gap:0;padding:0 6px;}
  .nav-links a{flex-direction:column;align-items:center;padding:6px 10px;gap:3px;font-size:10px;background:transparent;}
  .nav-links a span{display:none;}
  .nav-links a i{font-size:22px;display:block;}
  .nav-links a.active{color:var(--accent);background:var(--accent-light);border-radius:12px;}
  .page{display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:100vh;text-align:center;padding:40px 24px 100px;}
}
</style>
</head>
<body>
<nav>
  <a href="index.html" class="logo">MUR<span>.</span></a>
  <ul class="nav-links">
    <li><a href="index.html" class="active"><i class="fa-solid fa-house"></i><span>Home</span></a></li>
    <li><a href="about.html"><i class="fa-solid fa-user"></i><span>About</span></a></li>
    <li><a href="Skill.html"><i class="fa-solid fa-code"></i><span>Skills</span></a></li>
    <li><a href="projects.html"><i class="fa-solid fa-diagram-project"></i><span>Projects</span></a></li>
    <li><a href="contact.html"><i class="fa-solid fa-envelope"></i><span>Contact</span></a></li>
  </ul>
</nav>

<div class="page">
  <div class="avatar-wrap sa"><div class="avatar"><img src="https://media.licdn.com/dms/image/v2/D4E03AQHwe0ePw28DjQ/profile-displayphoto-scale_400_400/B4EZr59exdGUAg-/0/1765130238707?e=1778716800&v=beta&t=laMJgkWpCbV9i-I0qtZIyKHnRWIIhMVHzHhGt0zx_tI" alt="Mujeeb"><div class="avatar-ring"></div><div class="avatar-dot"></div></div></div>
  <div class="center">
    <div class="badge sa" style="transition-delay:0.1s">✨ Open to Internship &amp; Opportunities</div>
    <h1 class="sa" style="transition-delay:0.2s">Hi, I'm <span class="blue">Mujeeb<br>Ur Rehman</span></h1>
    <p class="subtitle sa" style="transition-delay:0.3s">Computer Science student at UMT Lahore. Passionate about Java programming, databases, and building things from scratch.</p>
    <div class="hero-btns sa" style="transition-delay:0.4s">
      <a href="projects.html" class="btn btn-blue">View Projects →</a>
      <a href="contact.html" class="btn btn-outline">Contact Me</a>
    </div>
  </div>
</div>

<script>
const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => { if(e.isIntersecting){ e.target.classList.add('visible'); observer.unobserve(e.target); }});
}, {threshold:0.1});
document.querySelectorAll('.sa').forEach(el => observer.observe(el));
</script>
</body>
</html>
